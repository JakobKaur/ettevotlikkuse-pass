<!DOCTYPE html>
<html lang="et">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lisa kogemus — Ettevõtlikkuse Pass</title>
  <link rel="stylesheet" href="../style/style.css">
</head>
<body>

<nav>
  <a id="logoLink" class="logo-home-link" href="esileht.html"><span class="logo-icon"></span></a>
  <div class="nav-user">
    <a href="profiil.html" class="profile-btn" id="navName">…</a>
    <a href="#" class="close-btn" onclick="DB.logout();window.location.href='sisselogimine.html'">✕</a>
  </div>
</nav>

<main>
  <div class="reg-box">
    <h2>Lisa kogemus</h2>
    <div id="msg"></div>
    <div class="field">
      <label>Kategooria</label>
      <select id="category">
        <option value="">— Vali kategooria —</option>
        <option>Kogemused / Projektitegevused</option>
        <option>Koolitused / Laagrid</option>
        <option>Erasmus+ / Rahvusvahelised tegevused</option>
        <option>Heategevused / Vabatahtlikud tööd</option>
        <option>Eneseareng</option>
      </select>
    </div>
    <div class="field">
      <label>Pealkiri</label>
      <input type="text" id="title" class="wide" placeholder="Kogemuse lühike nimetus">
    </div>
    <div class="field">
      <label>Organisatsioon</label>
      <input type="text" id="organisation" class="wide" placeholder="Korraldaja / asutuse nimi">
    </div>
    <div class="field">
      <label>Kuupäev</label>
      <input type="date" id="date" class="short">
    </div>
    <div class="field">
      <label>Tunnid</label>
      <input type="number" id="hours" class="short" min="0" max="10000" placeholder="0">
    </div>
    <div class="field">
      <label>Kirjeldus</label>
      <textarea id="description" placeholder="Kirjeldage lühidalt, mida tegite ja mida õppisite…"></textarea>
    </div>
    <div class="btn-row">
      <button onclick="window.location.href='dashboard.html'">Tühista</button>
      <button onclick="doSubmit()" class="btn-primary">Esita kinnitamiseks</button>
    </div>
  </div>
</main>

<footer id="kontakt">
  <h2>Kontakt</h2>
  <p>Email: firma@gmail.com<br>Tel: +372 5000 0000<br>Aadress: Kopli 1, Tartu 50115 Eesti</p>
</footer>

<script src="../DB/db.js"></script>
<script>
  document.getElementById('logoLink').href = DB.getHomeLink();
  const user = DB.requireAuth('student');
  if (!user) throw '';
  document.getElementById('navName').textContent = user.fullName;

  function showMsg(text, ok) {
    document.getElementById('msg').innerHTML =
      '<p class="msg ' + (ok ? 'msg-success' : 'msg-error') + '">' + text + '</p>';
  }

  function doSubmit() {
    const category    = document.getElementById('category').value;
    const title       = document.getElementById('title').value.trim();
    const organisation= document.getElementById('organisation').value.trim();
    const date        = document.getElementById('date').value;
    const hours       = document.getElementById('hours').value;
    const description = document.getElementById('description').value.trim();
    if (!category || !title || !description) { showMsg('Palun täitke kohustuslikud väljad: kategooria, pealkiri, kirjeldus.'); return; }
    const result = DB.addExperience({ userId: user.id, category, title, organisation, date, hours, description });
    if (!result.ok) { showMsg('Midagi läks valesti. Proovige uuesti.'); return; }
    showMsg('✓ Kogemus edukalt esitatud kinnitamiseks!', true);
    setTimeout(() => window.location.href = 'dashboard.html', 1500);
  }
</script>
</body>
</html>
