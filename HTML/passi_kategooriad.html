<!DOCTYPE html>
<html lang="et">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Passi kategooriad — Ettevõtlikkuse Pass</title>
  <link rel="stylesheet" href="../style/style.css">
</head>
<body>

  <nav>
    <a id="logoLink" class="logo-home-link" href="esileht.html"><span class="logo-icon"></span></a>
    <div class="nav-user">
      <a href="profiil.html" class="profile-btn" id="navName">…</a>
      <a href="#" class="close-btn" onclick="DB.logout();window.location.href='sisselogimine.html'">✕</a>
    </div>
  </nav>

  <main>
    <div class="pass-box pass-box-wide">
      <h2>Passi kategooriad</h2>

      <div class="header-row row-end mb-16">
        <button onclick="window.location.href='lisa_kogemus.html'" class="btn-primary">+ Lisa kogemus</button>
      </div>

      <div id="accordion"></div>

      <div class="btn-row mt-20">
        <button onclick="window.location.href='dashboard.html'">← Tagasi</button>
      </div>
    </div>
  </main>

  <footer id="kontakt">
    <h2>Kontakt</h2>
    <p>Email: firma@gmail.com<br>Tel: +372 5000 0000<br>Aadress: Kopli 1, Tartu 50115 Eesti</p>
  </footer>

  <script src="../DB/db.js"></script>
  <script>
    document.getElementById('logoLink').href = DB.getHomeLink();
    const user = DB.requireAuth('student');
    if (!user) throw '';
    document.getElementById('navName').textContent = user.fullName;

    function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

    function statusBadge(s) {
      const map = { pending: 'Ootel', approved: 'Kinnitatud', rejected: 'Tagasi lükatud' };
      const state = map[s] ? s : 'pending';
      return '<span class="status-badge status-' + state + '">' + map[state] + '</span>';
    }

    const exps = DB.getUserExperiences(user.id);

    document.getElementById('accordion').innerHTML = DB.CATEGORIES.map((cat, i) => {
      const catExps      = exps.filter(e => e.category === cat);
      const approvedCount = catExps.filter(e => e.status === 'approved').length;
      const itemsHTML    = catExps.length === 0
        ? '<p class="list-empty">Selles kategoorias pole veel kogemusi.</p>'
        : catExps.map(e =>
            '<div class="exp-item">' +
              '<div class="exp-main">' +
                '<div class="exp-title">' + esc(e.title) + '</div>' +
                '<div class="exp-meta">' + esc(e.organisation||'') + (e.date ? ' · ' + e.date : '') + (e.hours ? ' · ' + e.hours + 'h' : '') + '</div>' +
                (e.reviewNote ? '<div class="exp-note">Kommentaar: ' + esc(e.reviewNote) + '</div>' : '') +
              '</div>' +
              statusBadge(e.status) +
            '</div>'
          ).join('');
      return '<div class="accordion-item" id="acc-' + i + '">' +
        '<div class="accordion-header" onclick="toggle(' + i + ')">' +
          cat + ' <span class="small-text">(' + approvedCount + ' kinnitatud)</span>' +
          '<span class="arrow">&#8964;</span>' +
        '</div>' +
        '<div class="accordion-body">' + itemsHTML + '</div>' +
      '</div>';
    }).join('');

    function toggle(i) { document.getElementById('acc-' + i).classList.toggle('open'); }
  </script>

</body>
</html>
