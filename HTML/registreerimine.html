<!DOCTYPE html>
<html lang="et">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registreerimine — Ettevõtlikkuse Pass</title>
<link rel="stylesheet" href="../style/style.css">
</head>
<body>

<nav>
  <a id="logoLink" class="logo-home-link" href="esileht.html"><span class="logo-icon"></span></a>
  <ul class="nav-links">
    <li><a href="esileht.html#meist">Meist</a></li>
    <li><a href="esileht.html#teenused">Teenused</a></li>
    <li><a href="esileht.html#kontakt">Kontakt</a></li>
  </ul>
</nav>

<main>
  <div class="reg-box">
    <h2>Registreerimine</h2>
    <div id="msg"></div>
    <div class="field">
      <label>Täisnimi</label>
      <input type="text" id="fullName" class="wide">
    </div>
    <div class="field">
      <label>Vanus</label>
      <input type="number" id="age" class="short" min="10" max="99">
    </div>
    <div class="field">
      <label>Email</label>
      <input type="email" id="email" class="wide">
    </div>
    <div class="field">
      <label>Parool</label>
      <input type="password" id="password" class="wide">
    </div>
    <div class="field">
      <label>Korda parool</label>
      <input type="password" id="password2" class="wide">
    </div>
    <div class="field">
      <label>Tel</label>
      <input type="tel" id="phone" class="wide" placeholder="+372 ...">
    </div>
    <div class="btn-row">
      <button onclick="window.location.href='sisselogimine.html'">Tagasi</button>
      <button onclick="doRegister()" class="btn-primary">Registreeri</button>
    </div>
  </div>
</main>

<footer id="kontakt">
  <h2>Kontakt</h2>
  <p>Email: firma@gmail.com<br>Tel: +372 5000 0000<br>Aadress: Kopli 1, Tartu 50115 Eesti</p>
</footer>

<script src="../DB/db.js"></script>
<script>
  document.getElementById('logoLink').href = DB.getHomeLink();
  function msg(text, ok) {
    document.getElementById('msg').innerHTML =
      '<p class="msg ' + (ok ? 'msg-success' : 'msg-error') + '">' + text + '</p>';
  }

  function doRegister() {
    const fullName  = document.getElementById('fullName').value.trim();
    const age       = document.getElementById('age').value;
    const email     = document.getElementById('email').value.trim();
    const password  = document.getElementById('password').value;
    const password2 = document.getElementById('password2').value;
    const phone     = document.getElementById('phone').value.trim();

    if (!fullName || !age || !email || !password || !password2) { msg('Palun täitke kõik kohustuslikud väljad.'); return; }
    if (password !== password2) { msg('Paroolid ei kattu.'); return; }
    if (password.length < 8)    { msg('Parool peab olema vähemalt 8 tähemärki.'); return; }

    const result = DB.register({ fullName, age, email, password, phone });
    if (!result.ok) { msg(result.error); return; }
    msg('Konto loodud! Saad nüüd sisse logida.', true);
    setTimeout(() => window.location.href = 'sisselogimine.html', 1200);
  }
</script>
</body>
</html>
